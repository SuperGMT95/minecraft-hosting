<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreMMC | Premium Hosting Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card-bg: #0d1117;
            --primary: #6366f1;
            --secondary: #0ea5e9;
            --text-white: #ffffff;
            --text-dim: #9ca3af;
            --border: rgba(255, 255, 255, 0.05);
            --glow: rgba(99, 102, 241, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-white);
            line-height: 1.6;
            overflow-x: hidden;
            padding-bottom: 100px;
        }

        /* --- Updated GIF Background --- */
        .background { 
            position: fixed; 
            inset: -50px; 
            /* GIF background setup */
            background: url('https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExczl2aXZ4Mmd1bWQ2cWlmdWV5bWpjbzM5bjZpcnkyMDkweTU5MGw5eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/v63B5WpbX0a03HAVRV/giphy.gif') center/cover no-repeat; 
            filter: blur(4px) brightness(0.35); /* Text readability ke liye brightness thoda kam kiya hai */
            z-index: -1; 
            transition: transform 0.2s ease-out; 
            pointer-events: none;
        }

        /* --- Snowfall Effect --- */
        .snowflake {
            position: fixed;
            top: -10px;
            z-index: 9999;
            color: #fff;
            opacity: 0.6;
            user-select: none;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(110vh); }
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 8%;
            position: fixed;
            width: 100%;
            top: 0;
            background: rgba(5, 7, 10, 0.6);
            backdrop-filter: blur(15px);
            z-index: 1000;
            border-bottom: var(--border) 1px solid;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary);
            box-shadow: 0 0 15px var(--glow);
        }

        .logo-text { font-size: 22px; font-weight: 800; }
        .logo-text span { color: var(--primary); }
        
        .nav-links { display: flex; gap: 25px; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--text-dim); font-size: 14px; font-weight: 500; transition: 0.3s; }
        .nav-links a:hover { color: var(--text-white); }

        .nav-btns { display: flex; gap: 15px; }
        .btn-panel { background: transparent; border: 1px solid var(--border); color: white; padding: 8px 18px; border-radius: 8px; cursor: pointer; }
        .btn-get { background: var(--primary); border: none; color: white; padding: 8px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }

        /* Mobile Floating Nav bar */
        .mobile-nav-bar {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 450px;
            background: #6366f1;
            padding: 15px 25px;
            border-radius: 25px;
            z-index: 2000;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .mobile-nav-bar a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mobile-nav-bar .divider {
            color: rgba(255,255,255,0.4);
            font-size: 18px;
        }

        /* Hero Section */
        .hero {
            padding: 180px 5% 100px;
            text-align: center;
            position: relative;
        }

        .badge {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(99, 102, 241, 0.2);
            display: inline-block;
            margin-bottom: 25px;
        }

        .hero h1 {
            font-size: clamp(32px, 8vw, 65px);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .hero h1 .performance-text {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
        }

        .hero p { color: var(--text-dim); font-size: 16px; max-width: 600px; margin: 0 auto 40px; }

        .hero-btns { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .btn-main { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; padding: 18px 50px; border-radius: 12px; text-decoration: none; font-weight: 700; width: 280px; text-align: center; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2); }
        .btn-sec { border: 1px solid var(--border); color: white; padding: 18px 50px; border-radius: 12px; text-decoration: none; font-weight: 700; width: 280px; text-align: center; background: rgba(255,255,255,0.03); }

        @media (max-width: 768px) {
            nav { display: none; }
            .mobile-nav-bar { display: flex; }
            .hero { padding: 140px 5% 80px; }
            .hero h1 { font-size: 36px; }
            .background { filter: blur(2px) brightness(0.4); } /* Mobile par performance ke liye blur kam */
        }
    </style>
</head>
<body>

<div class="background" id="parallax-bg"></div>

<nav>
    <div class="logo-container">
        <img src="https://cdn.discordapp.com/attachments/1457594773010518086/1480537990446190726/copilot_image_1761965106943.jpg?ex=69b009f3&is=69aeb873&hm=aa716bf886560096135e6ef24b1463c49d6b01b08eaaf8bac6ff028c9c8b1360&" alt="CoreMMC Logo" class="logo-img">
        <div class="logo-text">⚡ Core<span>MMC</span></div>
    </div>
    <ul class="nav-links">
        <li><a href="#">Features</a></li>
        <li><a href="#">Hosting</a></li>
        <li><a href="#">Status</a></li>
    </ul>
    <div class="nav-btns">
        <button class="btn-panel">Panels</button>
        <button class="btn-get">Get Started</button>
    </div>
</nav>

<div class="mobile-nav-bar">
    <a href="#">🏠 Home</a>
    <div class="divider">|</div>
    <a href="#">🖥️ Panel</a>
    <div class="divider">|</div>
    <a href="#">💬 Support</a>
</div>

<section class="hero">
    <div class="badge">🚀 CoreMMC || India's Fastest Hosting</div>
    <h1>Premium Hosting <br> <span class="performance-text">Built for Performance</span></h1>
    <p>VPS • Game • Bot • Web Hosting <br> Smooth Performance • Zero Lag • Pure Stability</p>
    
    <div class="hero-btns">
        <a href="#plans" class="btn-main">View Plans →</a>
        <a href="#" class="btn-sec">Contact Support</a>
    </div>
</section>

<section style="text-align: center; padding: 20px 0;">
    <img src="https://i.imgur.com/86zD8Ym.png" alt="Global Network" style="width: 80%; max-width: 400px; filter: drop-shadow(0 0 30px var(--glow));">
</section>

<script>
    // Desktop Parallax Effect
    const bg = document.getElementById('parallax-bg');
    if (window.innerWidth > 768) {
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 45;
            const y = (window.innerHeight / 2 - e.pageY) / 45;
            bg.style.transform = `translate(${x}px, ${y}px)`;
        });
    }

    // Snowfall Effect logic
    function createSnowflake() {
        const snowflake = document.createElement('div');
        snowflake.classList.add('snowflake');
        snowflake.innerHTML = '❄';
        snowflake.style.left = Math.random() * 100 + 'vw';
        snowflake.style.animationDuration = Math.random() * 3 + 5 + 's'; 
        snowflake.style.opacity = Math.random() * 0.4;
        snowflake.style.fontSize = Math.random() * 8 + 8 + 'px';
        document.body.appendChild(snowflake);
        
        setTimeout(() => {
            snowflake.remove();
        }, 7000);
    }
    
    // Performance friendly snowflake generation
    const interval = window.innerWidth > 768 ? 200 : 400;
    setInterval(createSnowflake, interval);
</script>

</body>
</html>
